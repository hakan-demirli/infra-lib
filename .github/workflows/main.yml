name: "Nix Build and Test"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  fast-checks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-22.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - name: Run fast checks
        run: |
          checks=$(nix flake show --json 2>/dev/null \
            | jq -r '.checks."${{ matrix.system }}" // {} | keys[] | select(startswith("test-") | not)')
          for check in $checks; do
            if [[ "${{ matrix.system }}" == "aarch64-linux" && "$check" == "ephemeral-root" ]]; then
              echo "Skipping $check on aarch64-linux (requires KVM)"
              continue
            fi
            echo "Building checks.${{ matrix.system }}.$check"
            nix build ".#checks.${{ matrix.system }}.$check"
          done

  discover-vm-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - id: list
        run: |
          tests=$(nix eval --json '.#checks.x86_64-linux' --apply 'builtins.attrNames' \
            | jq -c 'map(select(startswith("test-")))')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "discovered: $tests"

  vm-tests:
    needs: [discover-vm-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-vm-tests.outputs.tests) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: BRAINSia/free-disk-space@7048ffbf50819342ac964ef3998a51c2564a8a75
        with:
          tool-cache: false
          mandb: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - name: Run ${{ matrix.test }}
        run: nix build .#checks.x86_64-linux.${{ matrix.test }}

  flake-check:
    name: flake-check
    needs: [fast-checks, vm-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.fast-checks.result }}" != "success" \
             || "${{ needs.vm-tests.result }}" != "success" ]]; then
            echo "fast-checks: ${{ needs.fast-checks.result }}"
            echo "vm-tests:    ${{ needs.vm-tests.result }}"
            exit 1
          fi
